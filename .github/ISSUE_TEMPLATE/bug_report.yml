name: Bug Report
description: Report something that isn't working correctly
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Tool
      description: Which tool was affected?
      placeholder: "e.g. fetch_page, stealth_fetch_page, extract_elements, get_youtube_transcript"
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: "Shark-no-Kari version (check startup logs or pyproject.toml)"
      placeholder: "e.g. 1.1.0"
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker (ghcr.io image)
        - Docker (local build)
        - Local (no Docker)
    validations:
      required: false
