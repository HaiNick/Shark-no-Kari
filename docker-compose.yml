services:
  shark-no-kari:
    image: ghcr.io/hainick/shark-no-kari:latest
    container_name: shark-no-kari
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    # Shared memory needed for headless browsers
    shm_size: "512mb"
    volumes:
      - kari_oauth_state:/app/oauth_state
    networks:
      - mcp-net
    depends_on:
      nordlynx-proxy:
        condition: service_healthy
        required: false

  nordlynx-proxy:
    image: edgd1er/nordlynx-proxy:latest
    container_name: kari-nordlynx
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
      net.ipv4.conf.all.rp_filter: 2
    environment:
      NORDVPN_LOGIN: ${NORDVPN_TOKEN}
      CONNECT: ${NORDVPN_COUNTRY:-Germany}
      TECHNOLOGY: NordLynx
      IPV6: "off"
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -x socks5h://127.0.0.1:1080 -s https://httpbin.org/ip || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: kari-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mcp-net

volumes:
  caddy_data:
  caddy_config:
  kari_oauth_state:

networks:
  mcp-net:
