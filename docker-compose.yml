services:
  shark-no-kari:
    image: ghcr.io/hainick/shark-no-kari:latest
    container_name: shark-no-kari
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    # Shared memory needed for headless browsers
    shm_size: "512mb"
    networks:
      - mcp-net

  caddy:
    image: caddy:2-alpine
    container_name: kari-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mcp-net

volumes:
  caddy_data:
  caddy_config:

networks:
  mcp-net:
